<!DOCTYPE html>
<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Story Editor - {% block title %}{% endblock title %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='assets/styles.css') }}">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/favicon.ico') }}">

  {% block head %}{% endblock head %}
</head>

<body class="{% block body_class %}{% endblock %}">
  {% include("_navigation.html") %}
  {% import '_components.html' as macros %}
  <header>
    {% block header %}{% endblock header %}
  </header>
  <main class="container-fluid px-3 px-lg-5">
    <!-- Your page content here -->
    {% block content %}<p>No messages.</p>{% endblock content %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

  {% block scripts %}{% endblock scripts %}


</body>

</html>
